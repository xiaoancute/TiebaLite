syntax = "proto3";

package tieba.getDislikeList;

option java_package = "com.huanchengfly.tieba.post.api.models.protos.getDislikeList";

import "CommonRequest.proto";
import "Error.proto";
import "ForumList.proto";

message GetDislikeListRequestData {
  CommonRequest common = 1;
  int32 pn = 3;
  int32 rn = 4;
}

message GetDislikeListRequest {
  GetDislikeListRequestData data = 1;
}

message GetDislikeListResponseData {
  repeated ForumList forum_list = 1;
  int32 has_more = 2;
  int32 cur_page = 3;
}

message GetDislikeListResponse {
  Error error = 1;
  GetDislikeListResponseData data = 2;
}
