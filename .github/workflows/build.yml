name: Build, Deploy

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "zulu"
          cache: gradle

      - name: Validate tag release signing config
        if: ${{ github.ref_type == 'tag' }}
        env:
          RELEASE_KEYSTORE: ${{ vars.RELEASE_KEYSTORE }}
          RELEASE_KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}
          KEYSTORE: ${{ secrets.KEYSTORE }}
          RELEASESTOREPASSWORD: ${{ secrets.RELEASESTOREPASSWORD }}
          RELEASEKEYPASSWORD: ${{ secrets.RELEASEKEYPASSWORD }}
        run: |
          missing=0
          for key in RELEASE_KEYSTORE RELEASE_KEY_ALIAS KEYSTORE RELEASESTOREPASSWORD RELEASEKEYPASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing release signing config::${key} is required for tag prereleases."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode Keystore
        if: ${{ github.ref_type == 'tag' }}
        env:
          RELEASE_KEYSTORE: ${{ vars.RELEASE_KEYSTORE }}
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: |
          printf '%s' "${KEYSTORE}" | base64 --decode > "${RELEASE_KEYSTORE}"

      - name: Generate keystore.properties
        if: ${{ github.ref_type == 'tag' }}
        run: |
          echo keystore.file="${{ vars.RELEASE_KEYSTORE }}" >> keystore.properties
          echo keystore.password="${{ secrets.RELEASESTOREPASSWORD }}" >> keystore.properties
          echo keystore.key.alias="${{ vars.RELEASE_KEY_ALIAS }}" >> keystore.properties
          echo keystore.key.password="${{ secrets.RELEASEKEYPASSWORD }}" >> keystore.properties

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Read Output Metadata
        id: read_output_metadata
        run: |
          version_code=$(jq -r '.elements[0].versionCode' ./app/build/outputs/apk/release/output-metadata.json)
          version_name=$(jq -r '.elements[0].versionName' ./app/build/outputs/apk/release/output-metadata.json)
          echo "version_code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload Release Package
        uses: actions/upload-artifact@v7
        with:
          name: "release-${{ steps.read_output_metadata.outputs.version_name }}(${{ steps.read_output_metadata.outputs.version_code }})"
          path: ./app/build/outputs/apk/release

      - name: Upload Mapping
        uses: actions/upload-artifact@v7
        with:
          name: mapping
          path: ./app/build/outputs/mapping/release

      - name: Prepare prerelease notes
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: |
          mkdir -p .github/release-notes/.out
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            -f target_commitish="${TARGET_COMMITISH}" \
            --jq '.body' > .github/release-notes/.out/generated-notes.md
          cp .github/release-notes/recovery-prerelease.md .github/release-notes/.out/release-notes.md
          printf '\n\n## Auto-generated Changes\n\n' >> .github/release-notes/.out/release-notes.md
          cat .github/release-notes/.out/generated-notes.md >> .github/release-notes/.out/release-notes.md

      - name: Generate update manifest
        if: ${{ github.ref_type == 'tag' }}
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          files=(./app/build/outputs/apk/release/*.apk)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error title=Missing release asset::No release APK was produced."
            exit 1
          fi

          mkdir -p .github/release-notes/.out
          bash .github/scripts/generate-update-json.sh \
            --repo "${GITHUB_REPOSITORY}" \
            --channel "recovery" \
            --tag "${TAG_NAME}" \
            --version-code "${{ steps.read_output_metadata.outputs.version_code }}" \
            --version-name "${{ steps.read_output_metadata.outputs.version_name }}" \
            --apk "${files[0]}" \
            --notes .github/release-notes/.out/release-notes.md \
            --output .github/release-notes/.out/update.json

      - name: Publish GitHub prerelease
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          assets=(./app/build/outputs/apk/release/*.apk .github/release-notes/.out/update.json)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error title=Missing release asset::No release APK was produced."
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes-file .github/release-notes/.out/release-notes.md \
              --prerelease
            gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${assets[@]}" \
              --verify-tag \
              --title "${TAG_NAME}" \
              --notes-file .github/release-notes/.out/release-notes.md \
              --prerelease \
              --latest=false
          fi

      - name: Post to channel
        if: ${{ github.event_name != 'pull_request' && github.ref_type != 'tag' && contains(github.event.head_commit.message, '[skip post]') == false }}
        env:
          CHANNEL_ID: ${{ secrets.CHANNEL_DEV_ID }}
          BOT_TOKEN: ${{ secrets.BOT_DEV_TOKEN }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_MESSAGE: |+
            ```
            ${{ github.event.head_commit.message }}
            ```

            构建分支：[${{ github.ref }}](${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }})
            构建版本：[${{ github.sha }}]("$COMMIT_URL")
          ACTION_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHANNEL_ID" ]; then
            export RELEASE=$(find ./app/build/outputs/apk/release -name "*.apk")
            ESCAPED=`python3 -c 'import json,os,urllib.parse; msg = json.dumps(os.environ["COMMIT_MESSAGE"]); print(urllib.parse.quote(msg if len(msg) <= 1024 else json.dumps(os.environ["COMMIT_URL"])))'`
            curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup?chat_id=${CHANNEL_ID}&media=%5B%7B%22type%22%3A%22document%22%2C%22media%22%3A%22attach%3A%2F%2Frelease%22%2C%22parse_mode%22%3A%22MarkdownV2%22%2C%22caption%22%3A${ESCAPED}%7D%5D&reply_markup=%7B%22inline_keyboard%22%3A%20%5B%5B%7B%22text%22%3A%20%22%E5%9C%A8+Github+%E4%B8%8A%E6%9F%A5%E7%9C%8B%22%2C%20%22url%22%3A%20${ACTION_URL}%7D%5D%5D%7D" -F release="@$RELEASE"
          fi
